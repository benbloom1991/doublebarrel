<script src="https://player.vimeo.com/api/player.js"></script>
<script>
  const VIMEO_ID   = "1206302641";
  const VIMEO_HASH = "48ae105c68";

  function go(){ document.body.classList.add("in"); }
  addEventListener("load", go); setTimeout(go, 400);

  (function(){
    const poster = document.getElementById("poster");
    window.__vimeoPoster = function(data){
      if(!data || !data.thumbnail_url) return;
      let url = data.thumbnail_url.replace(/-d_\d+x\d+$/, "-d_1920x1080");
      const img = new Image();
      img.onload = () => { poster.style.backgroundImage = `url("${url}")`; poster.classList.add("on"); };
      img.onerror = () => { poster.style.backgroundImage = `url("${data.thumbnail_url}")`; poster.classList.add("on"); };
      img.src = url;
    };
    const s = document.createElement("script");
    s.src = "https://vimeo.com/api/oembed.json?url="
      + encodeURIComponent(`https://vimeo.com/${VIMEO_ID}/${VIMEO_HASH}`)
      + "&width=1920&callback=__vimeoPoster";
    document.head.appendChild(s);
  })();

  (function(){
    const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
    const saveData = navigator.connection && navigator.connection.saveData;
    if(reduce || saveData) return;
    const wrap = document.getElementById("vimeoWrap");
    const iframe = document.createElement("iframe");
    iframe.src = `https://player.vimeo.com/video/${VIMEO_ID}?h=${VIMEO_HASH}`
      + `&background=1&autoplay=1&muted=1&loop=1&autopause=0&dnt=1`;
    iframe.allow = "autoplay; fullscreen; picture-in-picture";
    iframe.title = "";
    wrap.appendChild(iframe);
    const reveal = () => wrap.classList.add("on");
    try{
      const player = new Vimeo.Player(iframe);
      player.on("playing", reveal);
      player.ready().then(()=> setTimeout(reveal, 300)).catch(()=>{});
    }catch(e){}
    setTimeout(reveal, 1500);
  })();
</script>
